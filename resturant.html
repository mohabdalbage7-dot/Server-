<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوترة - نسخة المطاعم والكافيهات</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 50%, #fecfef 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 600px; margin: 0 auto; background: white; border-radius: 25px; padding: 25px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
.header { text-align: center; margin-bottom: 25px; }
.header h1 { color: #ff6b6b; font-size: 26px; margin-bottom: 8px; }
.header p { color: #666; font-size: 14px; }
.badge { background: #ff6b6b; color: white; padding: 4px 12px; border-radius: 15px; font-size: 11px; display: inline-block; margin-top: 8px; }
.table-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
.table-btn { padding: 20px 10px; background: #f8f9fa; border: 2px solid #e0e0e0; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; font-weight: bold; }
.table-btn.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }
.menu-cat { margin: 20px 0 10px; color: #ff6b6b; font-weight: bold; font-size: 18px; }
.menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: #f8f9fa; border-radius: 12px; margin-bottom: 10px; }
.menu-item button { background: #4CAF50; color: white; border: none; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
.order-box { background: #fff3cd; border: 2px dashed #ffc107; padding: 20px; border-radius: 15px; margin: 20px 0; min-height: 100px; }
.order-item { display: flex; justify-content: space-between; margin-bottom: 8px; padding-bottom: 8px; border-bottom: 1px solid #ddd; }
.total { background: #ff6b6b; color: white; padding: 15px; border-radius: 12px; text-align: center; margin: 15px 0; font-size: 20px; font-weight: bold; }
.btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #ff6b6b 0%, #ff8e8e 100%); color: white; border: none; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
.back-btn { background: #6c757d; font-size: 14px; padding: 10px; }
.zatca-badge { text-align: center; background: #e8f5e9; padding: 10px; border-radius: 10px; margin-top: 15px; color: #2e7d32; font-size: 13px; }
</style>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🍔
