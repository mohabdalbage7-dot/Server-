<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فوترة - فاتورة إلكترونية متوافقة مع الزكاة</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
.header { text-align: center; margin-bottom: 30px; }
.header h1 { color: #667eea; font-size: 28px; margin-bottom: 10px; }
.header p { color: #666; }
.badge { background: #4CAF50; color: white; padding: 5px 15px; border-radius: 20px; font-size: 12px; display: inline-block; margin-top: 10px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
.form-group input,.form-group select { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 16px; transition: 0.3s; }
.form-group input:focus { border-color: #667eea; outline: none; }
.btn { width: 100%; padding: 15px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4); }
.items-table { width: 100%; margin: 20px 0; border-collapse: collapse; }
.items-table th { background: #667eea; color: white; padding: 12px; text-align: right; }
.items-table td { padding: 10px; border-bottom: 1px solid #eee; }
.add-item { background: #4CAF50; padding: 10px; font-size: 14px; margin-top: 10px; }
.total-box { background: #f8f9fa; padding: 20px; border-radius: 10px; margin-top: 20px; text-align: left; }
.total-box h3 { color: #667eea; margin-bottom: 10px; }
.zatca-info { background: #e8f5e9; border-right: 4px solid #4CAF50; padding: 15px; margin: 20px 0; border-radius: 5px; }
.zatca-info h4 { color: #2e7d32; margin-bottom: 5px; }
@media(max-width: 600px) {.container { padding: 20px; }.header h1 { font-size: 22px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧾 نظام فوترة الإلكتروني</h1>
        <p>إصدار فواتير ضريبية متوافقة مع هيئة الزكاة والضريبة ZATCA</p>
        <span class="badge">✓ متوافق مع المرحلة الثانية</span>
    </div>

    <div class="zatca-info">
        <h4>📋 معلومات المنشأة</h4>
        <p>الرقم الضريبي: <input type="text" placeholder="3000XXXXXXXXXXX" style="border: none; background: transparent; font-weight: bold;"></p>
    </div>

    <div class="form-group">
        <label>اسم العميل</label>
        <input type="text" placeholder="أدخل اسم العميل" id="clientName">
    </div>

    <div class="form-group">
        <label>رقم ضريبي للعميل - اختياري</label>
        <input type="text" placeholder="3000XXXXXXXXXXX">
    </div>

    <h3 style="margin: 20px 0 10px;">الأصناف</h3>
    <table class="items-table" id="itemsTable">
        <tr>
            <th>الصنف</th>
            <th>الكمية</th>
            <th>السعر</th>
            <th>الإجمالي</th>
        </tr>
        <tr>
            <td><input type="text" placeholder="اسم المنتج"></td>
            <td><input type="number" value="1" min="1" onchange="calcTotal()"></td>
            <td><input type="number" value="0" onchange="calcTotal()"></td>
            <td class="row-total">0.00</td>
        </tr>
    </table>
    <button class="btn add-item" onclick="addRow()">+ إضافة صنف</button>

    <div class="total-box">
        <h3>المجموع الفرعي: <span id="subtotal">0.00</span> ر.س</h3>
        <h3>ضريبة القيمة المضافة 15%: <span id="vat">0.00</span> ر.س</h3>
        <h2 style="color: #4CAF50;">الإجمالي: <span id="total">0.00</span> ر.س</h2>
    </div>

    <button class="btn" onclick="generateInvoice()" style="margin-top: 20px;">
        📄 إصدار الفاتورة الإلكترونية
    </button>

    <button class="btn" onclick="window.location='resturant.html'" style="margin-top: 10px; background: #ff9800;">
        🍔 نسخة المطاعم والكافيهات
    </button>
</div>

<script>
function calcTotal() {
    let rows = document.querySelectorAll('#itemsTable tr');
    let subtotal = 0;
    for(let i=1; i<rows.length; i++) {
        let qty = rows[i].cells[1].querySelector('input').value;
        let price = rows[i].cells[2].querySelector('input').value;
        let total = qty * price;
        rows[i].cells[3].innerText = total.toFixed(2);
        subtotal += total;
    }
    let vat = subtotal * 0.15;
    document.getElementById('subtotal').innerText = subtotal.toFixed(2);
    document.getElementById('vat').innerText = vat.toFixed(2);
    document.getElementById('total').innerText = (subtotal + vat).Fixed(2);
}

function addRow() {
    let table = document.getElementById('itemsTable');
    let row = table.insertRow();
    row.innerHTML = `
        <td><input type="text" placeholder="اسم المنتج"></td>
        <td><input type="number" value="1" min="1" onchange="calcTotal()"></td>
        <td><input type="number" value="0" onchange="calcTotal()"></td>
        <td class="row-total">0.00</td>
    `;
}

function generateInvoice() {
    alert('✅ تم إنشاء الفاتورة بنجاح!\n\nالفاتورة متوافقة مع متطلبات ZATCA\nQR Code + XML سيتم توليدها في النسخة الكاملة');
}
</script>
</body>
</html>
